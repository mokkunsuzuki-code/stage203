name: stage202-ci

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  actions: read
  contents: read

jobs:
  stage202:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      # ★gh が無いと fetch_actions_results.py が落ちる実装が多いので、先に入れる
      - name: Install GitHub CLI (gh)
        run: |
          sudo apt-get update
          sudo apt-get install -y gh
          gh --version

      - name: Fetch Actions results (self)
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p out/ci
          python tools/fetch_actions_results.py --repo "${{ github.repository }}"
          ls -la out/ci

      - name: Generate PoC report
        run: |
          python tools/gen_poc_report.py
          ls -la poc_report.md

      - name: Upload PoC report (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: stage202-poc-report
          path: |
            poc_report.md
            claims/claims.yaml
            out/ci/actions_runs.json
            out/ci/actions_jobs.json
          if-no-files-found: error
          retention-days: 90
