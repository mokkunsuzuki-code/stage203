name: stage203-ci

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  actions: read
  contents: read

jobs:
  attack_replay:
    name: attack_replay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run PoC main (to produce poc.jsonl)
        run: |
          set -euo pipefail
          python runtime/poc_runner.py --profile hybrid_balanced --failure none

      - name: Run mini PoC (replay)
        run: |
          set -euo pipefail
          bash mini_poc/poc_replay/run.sh

  attack_downgrade:
    name: attack_downgrade
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run PoC main (to produce poc.jsonl)
        run: |
          set -euo pipefail
          python runtime/poc_runner.py --profile hybrid_balanced --failure none

      - name: Run mini PoC (downgrade)
        run: |
          set -euo pipefail
          bash mini_poc/poc_downgrade/run.sh

  attack_drift_injection:
    name: attack_drift_injection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run PoC main (to produce poc.jsonl)
        run: |
          set -euo pipefail
          python runtime/poc_runner.py --profile hybrid_balanced --failure none

      - name: Run mini PoC (drift injection)
        run: |
          set -euo pipefail
          bash mini_poc/poc_drift_injection/run.sh

  interop_smoke:
    name: interop_smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Interop smoke (placeholder)
        run: |
          set -euo pipefail
          mkdir -p out/evidence/interop_smoke
          echo "[OK] interop_smoke placeholder" | tee out/evidence/interop_smoke/smoke.txt

  poc_report:
    name: poc_report
    runs-on: ubuntu-latest
    needs:
      - attack_replay
      - attack_downgrade
      - attack_drift_injection
      - interop_smoke

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyyaml

      - name: Install GitHub CLI (gh)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gh
          gh --version

      - name: Run PoC main (to produce poc.jsonl)
        run: |
          set -euo pipefail
          python runtime/poc_runner.py --profile hybrid_balanced --failure none

      - name: Generate local evidence bundle (for artifact)
        run: |
          set -euo pipefail
          bash mini_poc/poc_replay/run.sh
          bash mini_poc/poc_downgrade/run.sh
          bash mini_poc/poc_drift_injection/run.sh
          mkdir -p out/evidence/interop_smoke
          echo "[OK] interop_smoke placeholder" | tee out/evidence/interop_smoke/smoke.txt
          find out -maxdepth 4 -type f -print

      - name: Fetch Actions results (self)
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p out/ci
          python tools/fetch_actions_results.py --repo "${{ github.repository }}" --run-id "${{ github.run_id }}"
          ls -la out/ci

      - name: Generate PoC report
        run: |
          set -euo pipefail
          python tools/gen_poc_report.py
          ls -la poc_report.md

      - name: Upload PoC report (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: stage203-poc-report
          path: |
            poc_report.md
            claims/claims.yaml
            out/ci/actions_runs.json
            out/ci/actions_jobs.json
            out/evidence/**
            out/poc_logs/poc.jsonl
          if-no-files-found: error
          retention-days: 90
